# filename: docker-compose.yml
version: '3.9'

services:
  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      POSTGRES_DB: huduu
      POSTGRES_USER: huduu_user
      POSTGRES_PASSWORD: markhoyor
    # порт нээхгүй — зөвхөн internal network дотор
    restart: always

  backend:
    build:
      context: ./backend
    volumes:
      - ./backend/media:/app/media
    # порт нээхгүй — Nginx дотроос л холбогдоно
    env_file:
      - ./backend/.env
    depends_on:
      - db
    restart: always

  frontend:
    build:
      context: ./frontend
    command: sh -c "npm run build && npm start"
    # порт нээхгүй — Nginx дотроос л холбогдоно
    depends_on:
      - backend
    environment:
      - INTERNAL_API_URL=http://backend:8010/api
    env_file:
      - ./frontend/.env.local
    restart: always

volumes:
  postgres_data:
